services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api.localhost/api
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - backend

  # Laravel Backend PHP-FPM
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=structured_json
      - DB_CONNECTION=pgsql
      - SESSION_DRIVER=database
      - SESSION_DOMAIN=.eckox.ai
      - SANCTUM_STATEFUL_DOMAINS=eckox.ai,api.eckox.ai,localhost:3000
    volumes:
      - backend-storage:/var/www/html/storage
    expose:
      - "9000"
    restart: unless-stopped
    depends_on:
      - redis

  # Laravel Queue Worker
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=structured_json
      - DB_CONNECTION=pgsql
    volumes:
      - backend-storage:/var/www/html/storage
    restart: unless-stopped
    depends_on:
      - backend

  # Redis Cache & Queue
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/public:/var/www/html/public:ro
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

volumes:
  backend-storage:
  redis-data:
