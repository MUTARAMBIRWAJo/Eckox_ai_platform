services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.eckox.ai/api
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - backend

  # Laravel Backend (PHP-FPM tuned)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=stderr
      - DB_CONNECTION=pgsql
      - DB_HOST=aws-0-eu-west-1.pooler.supabase.com
      - DB_PORT=6543
      - DB_DATABASE=postgres
      - DB_USERNAME=postgres.iersoxgyzgkaebpteank
      - DB_SSLMODE=require
      - SESSION_DRIVER=database
      - SESSION_DOMAIN=.eckox.ai
      - SANCTUM_STATEFUL_DOMAINS=eckox.ai,api.eckox.ai
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - backend-storage:/var/www/html/storage
    expose:
      - "9000"
    restart: unless-stopped
    depends_on:
      - redis

  # Laravel Queue Worker (Redis-backed, separating jobs if needed)
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: php artisan queue:work redis --verbose --tries=3 --timeout=90
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_CHANNEL=stderr
      - DB_CONNECTION=pgsql
      - DB_HOST=aws-0-eu-west-1.pooler.supabase.com
      - DB_PORT=6543
      - DB_DATABASE=postgres
      - DB_USERNAME=postgres.iersoxgyzgkaebpteank
      - DB_SSLMODE=require
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - backend-storage:/var/www/html/storage
    restart: unless-stopped
    depends_on:
      - redis
      - backend

  # Redis Cache & Queue
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Nginx Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/public:/var/www/html/public:ro
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

volumes:
  backend-storage:
  redis-data:
