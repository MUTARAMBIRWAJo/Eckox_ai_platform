worker_processes auto;
error_log  /dev/stderr warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 32M;

    # Writable temp dirs (container runs as root but nginx worker as www-data)
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path       /tmp/nginx_proxy_temp;
    fastcgi_temp_path     /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path       /tmp/nginx_uwsgi_temp;
    scgi_temp_path        /tmp/nginx_scgi_temp;

    server {
        # ${PORT} is substituted by envsubst in entrypoint.sh
        listen ${PORT};
        listen [::]:${PORT};

        server_name _;
        root        /var/www/html/public;
        index       index.php;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"                   always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header X-XSS-Protection       "1; mode=block"                always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # Render / Laravel health check
        location = /up {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location = /api/health {
            try_files $uri $uri/ /index.php?$query_string;
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include       fastcgi_params;
        }

        # AI Streaming (SSE) — disable buffering for real-time chunks
        location ~ ^/api/ai/chat {
            try_files $uri $uri/ /index.php?$query_string;
            fastcgi_pass         127.0.0.1:9000;
            fastcgi_index        index.php;
            fastcgi_param        SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include              fastcgi_params;
            fastcgi_buffering    off;
            fastcgi_read_timeout 600s;
            fastcgi_send_timeout 600s;
        }

        # All other routes
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass        127.0.0.1:9000;
            fastcgi_index       index.php;
            fastcgi_param       SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include             fastcgi_params;
            fastcgi_read_timeout 300s;
            fastcgi_buffers     16 16k;
            fastcgi_buffer_size 32k;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }

        location = /favicon.ico { log_not_found off; access_log off; }
        location = /robots.txt  { log_not_found off; access_log off; }
    }
}
